# =============================================================================
# nav2_params.yaml — 地牛叉车 Nav2 导航参数配置
#
# 车型：Tricycle 前驱转向三轮车（前轮驱动+转向，base_link 在后轴连线中点）
# 整车尺寸：长 1.85m（含货叉超 2.6m）× 宽 0.7m
#
# 关键调参记录（详见 lidar_navigation_guide.md 避坑指南）：
#   1. FollowPath 预瞄距离 0.6m→1.8m：消除低速前轮剧烈扭摆（抖动 ±30°→≤1.8°）
#   2. footprint 按整车实际轮廓设置，前边界 1.60m，须与 laserscan_filter 的 x_max 一致
#   3. 代价地图障碍源为 /scan_filtered（过滤车体自遮挡后的干净扫描）
#   4. Tricycle 不能原地自转：use_rotate_to_heading=false，allow_reversing=false
#   5. ★ 禁用 Spin 恢复行为（behavior_plugins 移除 spin + 自定义无 Spin 行为树）：
#      伪原地自转（前轮 90°+高速驱动）扫掠面积大、Spin 碰撞检测漏检，会撞墙持续转圈
# =============================================================================

# ---------- AMCL 定位（模式 B 使用；模式 A-2（use_relocalization:=true）也使用本段做地图匹配重定位） ----------
amcl:
  ros__parameters:
    use_sim_time: false
    # 运动模型噪声系数（α1~α5）：轮式里程计误差估计，越大粒子越发散
    # FAST-LIO 提供的 odom→base_link 精度较高，但保守起见保持中等噪声
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_link
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: likelihood_field  # 似然场模型，室内结构化环境定位稳定
    max_beams: 120                       # 每次更新使用的激光束数由 60 提升至 120，显著增强稀疏特征环境下的定位精度                       # 每次更新使用的激光束数，越大越准但越耗 CPU
    max_particles: 2000                 # 粒子数上下限：收敛精度和算力的平衡
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    # ⚠️ 差速运动模型：Tricycle 无严格匹配的 AMCL 模型，用差速模型近似（转向角受限，够用）
    robot_model_type: nav2_amcl::DifferentialMotionModel
    save_pose_rate: 0.5
    set_initial_pose: false              # 不强制使用固定初始位姿；模式 A-2 首次需通过 RViz 2D Pose Estimate 给出粗位姿
    sigma_hit: 0.2
    update_min_d: 0.2                   # 平移 0.2m 才触发滤波更新
    update_min_a: 0.2                   # 旋转 0.2rad 才触发滤波更新
    # 观测模型权重：hit(命中)/short(意外近)/max(超程)/rand(随机)
    z_hit: 0.9
    z_max: 0.025
    z_rand: 0.05
    z_short: 0.025
    scan_topic: scan_filtered

# ---------- 行为树导航器：统筹 规划→控制→恢复 的完整导航任务流 ----------
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # ★ 自定义行为树（launch 中通过 RewrittenYaml 注入绝对路径）：
    # 已移除 Spin 90° 恢复动作 —— Tricycle 无法真正原地自转，底盘“前轮 90°+高速驱动”
    # 的近似旋转扫掠面积大，Spin 碰撞检测按纯旋转仿真会漏检，导致扫墙/撞墙持续转圈
    default_nav_to_pose_bt_xml: "navigate_to_pose_w_replanning_and_recovery_no_spin.xml"
    default_bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery_no_spin.xml"
    # ⚠️ through_poses 树也必须是无 Spin 版，否则 bt_navigator 激活时加载默认树
    # 会因 spin action server 不存在而失败，整车导航目标全部被拒
    default_nav_through_poses_bt_xml: "navigate_through_poses_w_replanning_and_recovery_no_spin.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# ---------- 控制器服务器：跟踪全局路径，输出 /cmd_vel ----------
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0          # 控制频率 20Hz
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5       # 横向速度阈值（Tricycle 无横向运动能力，此项不生效）
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # 进展检查：6 秒内必须移动超过 0.1m，否则判定卡死触发恢复行为
    # （原 3.0s 过严：长车身重载低速起步/贴墙蠕行时易误判卡死，频繁触发恢复链）
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 6.0
    # 到点判定：位置误差 ≤0.25m 且航向误差 ≤0.25rad 视为到达
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    # ========== RPP 纯追踪控制器（核心调参区） ==========
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4           # 期望线速度 0.4m/s（长车身重载，保守取值）
      # ★ 预瞄距离 1.8m（原 0.6m）：匹配长车身物理特性，消除低速前轮剧烈打角抖动
      lookahead_dist: 1.8
      min_lookahead_dist: 0.9          # 最小预瞄距离调至 0.9m，提供充足阻尼以彻底消除低速前轮扭摆（防抖、防电机过热），并保持合理切弯
      max_lookahead_dist: 2.5
      lookahead_time: 2.0               # 预瞄距离随速度动态缩放的时间常数
      rotate_to_heading_angular_vel: 1.0
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05        # 接近目标时的最小爬行速度
      approach_velocity_scaling_dist: 1.0       # 距目标 1.0m 内开始减速
      # 碰撞检测：预瞄路径上 1s 内可能碰撞则停车
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      # 规则化速度缩放：大曲率/近障碍自动降速
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_speed: 0.1
      regulated_linear_scaling_min_radius: 0.5
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.8
      cost_scaling_gain: 10.0
      inflation_cost_scaling_factor: 3.0
      max_ambient_duty_cycle: 0.95
      use_rotate_to_heading: false  # 禁用 RPP 原地自转对齐。防止长车身货叉在转弯时原地旋转扫墙导致避障卡死
      allow_reversing: false        # 禁止倒车（后向无雷达视野，安全风险）

# ---------- 局部代价地图：实时避障（滚动窗口跟随车体） ----------
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom                # 局部地图挂在 odom 系，避免定位抖动影响避障
      robot_base_frame: base_link
      use_sim_time: false
      transform_tolerance: 0.5
      rolling_window: true              # 5m×5m 滚动窗口，始终覆盖车体周边
      width: 5
      height: 5
      resolution: 0.05                  # 5cm 栅格分辨率
      robot_radius: 0.95  # 后备防撞圆半径（footprint 解析失败时的兜底）
      # ★ 整车碰撞轮廓：前边界 1.60m / 后边界 -0.25m / 半宽 0.35m
      # ⚠️ 修改前边界时必须同步修改 launch 中 laserscan_filter 的 x_max
      footprint: "[[1.60, 0.35], [1.60, -0.35], [-0.25, -0.35], [-0.25, 0.35]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered         # ★ 使用过滤自遮挡后的扫描，勿改回 /scan
          max_obstacle_height: 2.0
          clearing: true                # 允许射线穿透清除过期障碍
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0       # 超过 8m 的障碍不标记（远端不可靠）
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0          # 局部避障衰减慢一点，离墙更安全
        inflation_radius: 0.45          # 局部避障膨胀半径设为 0.45m
      always_send_full_costmap: true

# ---------- 全局代价地图：静态地图 + 实时障碍，供全局规划 ----------
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      transform_tolerance: 0.5
      robot_radius: 0.95
      footprint: "[[1.60, 0.35], [1.60, -0.35], [-0.25, -0.35], [-0.25, 0.35]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true   # 确保能收到 map_server 的 latched 地图
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered         # 同局部地图，使用过滤后的扫描
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.5          # 全局路径搜索衰减，强迫全局规划器走通道正中间
        inflation_radius: 0.55          # 全局膨胀半径增大至 0.55m，把规划路径顶得更靠弯道外侧
      always_send_full_costmap: true

# ---------- 地图服务器：加载 2D 栅格地图（yaml 路径由 launch 参数传入） ----------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

# ---------- 全局规划器：基于静态+实时代价地图搜索全局路径 ----------
planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5                    # 目标点 0.5m 容差内均可规划（目标附近有障碍也能出解）
      use_astar: false                  # false=Dijkstra；狭窄场景可改 true 用 A* 加速
      allow_unknown: true               # 允许穿越未知区域（建图边缘也能规划）

# ---------- 行为服务器：卡死恢复行为（后退/等待；★ 已禁用 spin） ----------
# spin 已移除：Tricycle 无法真正原地自转，“前轮打 90°+高速驱动”的近似旋转会扫墙/撞墙，
# 且 Spin 的碰撞检测按纯旋转 footprint 仿真，无法覆盖实际扫掠范围，撞墙也不会停。
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["backup", "wait"]
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
